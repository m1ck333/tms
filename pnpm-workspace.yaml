packages:
  - 'packages/*'
  - 'apps/*'

# Single source of truth for versions of deps shared across packages, so they
# never drift. Reference them in package.json as e.g. "react": "catalog:".
catalog:
  react: ^19.2.0
  react-dom: ^19.2.0
  '@types/react': ^19.2.5
  '@types/react-dom': ^19.2.3
  lucide-react: ^0.555.0
  tailwindcss: ^4.1.17
  '@tailwindcss/vite': ^4.1.17
  vite: ^7.2.4
  '@vitejs/plugin-react': ^5.1.1
